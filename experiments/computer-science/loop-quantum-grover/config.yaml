# Grover's Algorithm — CHP Experiment Config

project:
  name: "quantum-grover"
  description: "Simulated Grover's search with quadratic speedup verification"
  frozen_paths: ["frozen/"]
  chain_prompt: "CHAIN_PROMPT.md"

gates:
  seeds: 3
  convergence_seeds: 30
  sigma_threshold: 0.15
  anomaly_checks:
    - metric: "success_probability"
      operator: ">"
      threshold: 0.90
      description: "Grover at k_opt must find target with P > 0.90"
    - metric: "optimal_iterations"
      operator: "<="
      threshold: 30
      description: "Iterations must be O(sqrt(N)), not O(N)"
    - metric: "target_amplitude"
      operator: ">"
      threshold: 0.95
      description: "Target amplitude must dominate after k_opt"
  max_consecutive_anomalies: 3

critic:
  mindset: "Assume the build failed until proven otherwise"
  instruction: "Argue AGAINST the science before scoring it"
  specific_mission: "Check: is the oracle a phase flip or a boolean? Is diffusion present? Does iteration count scale as sqrt(N) or N? Is there a real state vector or just classical search?"
