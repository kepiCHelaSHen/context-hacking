# Spatial Prisoner's Dilemma — CHP Experiment Config

project:
  name: "spatial-prisoners-dilemma"
  description: "Nowak & May (1992) spatial PD with b-sweep and cooperation dynamics"
  frozen_paths: ["frozen/"]
  chain_prompt: "CHAIN_PROMPT.md"

gates:
  seeds: 3
  convergence_seeds: 30
  sigma_threshold: 0.15
  anomaly_checks:
    - metric: "cooperation_rate"
      operator: ">"
      threshold: 0.20
      description: "Cooperators must survive in spatial structure at b=1.8"
    - metric: "cooperation_rate"
      operator: "<"
      threshold: 0.80
      description: "Defectors must also survive (not trivial all-C)"
    - metric: "spatial_clustering"
      operator: ">"
      threshold: 0.0
      description: "Spatial structure must exist"
    - metric: "pattern_stability"
      operator: "<"
      threshold: 0.50
      description: "Pattern should stabilize (Hamming < 50% change/gen)"
  max_consecutive_anomalies: 3

loop:
  max_turns: 20
  stagnation_threshold: 5
  max_consecutive_exploration: 3
  auto_tag: true

critic:
  mindset: "Assume the build failed until proven otherwise"
  instruction: "Argue AGAINST the science before scoring it"
  specific_mission: "Verify synchronous update, self-inclusion in neighborhood, and b=1.8 exactly."
