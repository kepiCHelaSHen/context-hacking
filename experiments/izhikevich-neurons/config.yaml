# Izhikevich Neurons — CHP Experiment Config

project:
  name: "izhikevich-neurons"
  description: "Izhikevich (2003) spiking neuron with 5 firing patterns and HH contamination detection"
  frozen_paths: ["frozen/"]
  chain_prompt: "CHAIN_PROMPT.md"

gates:
  seeds: 3
  convergence_seeds: 30
  sigma_threshold: 0.15
  anomaly_checks:
    - metric: "spike_count"
      operator: ">"
      threshold: 5
      description: "Neuron must spike with I=10"
    - metric: "v_bounded"
      operator: "=="
      threshold: 1.0
      description: "Membrane potential must stay in [-90, 40] mV"
    - metric: "rs_isi_cv"
      operator: "<"
      threshold: 0.15
      description: "Regular spiking must have low ISI variability"
  max_consecutive_anomalies: 3

critic:
  mindset: "Assume the build failed until proven otherwise"
  instruction: "Argue AGAINST the science before scoring it"
  specific_mission: "Check for Hodgkin-Huxley contamination: variables m,h,n; parameters gNa,gK,gL; 4 equations instead of 2; conductance-based currents. The Izhikevich model has v,u,a,b,c,d ONLY."
